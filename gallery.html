<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photos</title>
    <link rel="manifest" href="gallery_manifest.json">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/4/4e/Google_Photos_Logo.svg">
    <meta name="theme-color" content="#ffffff">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; overflow-x: hidden; }
        
        /* Welcome/Login Screen */
        #login-screen { position: fixed; top:0; width:100%; height:100%; background:white; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .login-box { width:80%; text-align:center; }
        .login-input { width:100%; padding:15px; border:1px solid #ddd; border-radius:10px; margin-bottom:20px; font-size:16px; outline:none; }
        .login-btn { width:100%; padding:15px; background:#4285f4; color:white; border:none; border-radius:10px; font-weight:bold; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: bold; color: #5f6368; }
        .logo span { color: #4285f4; }
        
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .photo-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f0f0f0; border-radius: 4px; }

        .fab { position: fixed; bottom: 80px; right: 20px; background: white; padding: 12px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: none; font-weight: bold; color: #4285f4; z-index:500; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index:500; }
        .nav-item { text-align: center; color: #5f6368; font-size: 10px; }

        #locker-modal { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; text-align: center; padding-top: 100px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Google_Photos_Logo.svg" width="80" style="margin-bottom:30px;">
        <div class="login-box">
            <h3>स्वागत है</h3>
            <p style="color:#666;">अपनी फोटोज़ सुरक्षित रखने के लिए नाम डालें</p>
            <input type="text" id="user-name" class="login-input" placeholder="आपका नाम">
            <button class="login-btn" onclick="startApp()">शुरू करें</button>
        </div>
    </div>

    <div class="header">
        <div class="logo">Google <span>Photos</span></div>
        <div id="user-initial" style="width:35px; height:35px; background:#34a853; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold;">U</div>
    </div>

    <div class="photo-grid" id="gallery-box">
        </div>

    <button class="fab" onclick="document.getElementById('pick').click()">+ Add Photos</button>
    <input type="file" id="pick" hidden accept="image/*" onchange="upload(event)">

    <div class="nav">
        <div class="nav-item">🖼️<br>Photos</div>
        <div class="nav-item">🔍<br>Search</div>
        <div class="nav-item" onclick="openLocker()">🔒<br>Locker</div>
    </div>

    <div id="locker-modal">
        <h3>Private Safe</h3>
        <input type="password" id="pass" style="font-size:32px; width:120px; text-align:center; border:none; border-bottom:2px solid #4285f4; outline:none; letter-spacing:5px;" maxlength="4">
        <br><br>
        <button onclick="checkPass()" style="padding:10px 40px; background:#4285f4; color:white; border:none; border-radius:20px;">Unlock</button>
        <p onclick="document.getElementById('locker-modal').style.display='none'">Cancel</p>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://survey-form-data-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = "";

        function startApp() {
            currentUser = document.getElementById('user-name').value.trim();
            if(!currentUser) return alert("कृपया नाम डालें!");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('user-initial').innerText = currentUser[0].toUpperCase();
            loadPhotos();
        }

        function upload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const url = event.target.result;
                // Save to user's specific folder in Firebase
                db.ref('galleries/' + currentUser).push({ image: url });
                loadPhotos();
            }
            reader.readAsDataURL(file);
        }

        function loadPhotos() {
            const box = document.getElementById('gallery-box');
            box.innerHTML = "";
            db.ref('galleries/' + currentUser).on('value', (snap) => {
                box.innerHTML = "";
                snap.forEach((child) => {
                    const img = document.createElement('img');
                    img.src = child.val().image;
                    img.className = 'photo-item';
                    box.prepend(img);
                });
            });
        }

        function openLocker() { document.getElementById('locker-modal').style.display='block'; }
        function checkPass() {
            if(document.getElementById('pass').value === "1234") {
                alert("Hidden Folder Unlocked!");
                document.getElementById('locker-modal').style.display='none';
            } else { alert("Wrong PIN!"); }
        }
    </script>
</body>
</html>
